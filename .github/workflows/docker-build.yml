name: Build and Push Docker Image

# 触发条件：推送到main分支、打标签，或手动触发
on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch: # 手动触发

# 权限配置（必要，用于推送镜像/操作GitHub Packages）
permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform: [ linux/amd64, linux/arm64 ] # 支持的架构

    steps:
      # 步骤1：检出代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 步骤2：设置QEMU（支持多架构构建）
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 步骤3：设置Docker Buildx（增强构建能力）
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 步骤4：登录镜像仓库（按需选择：GitHub Packages/Docker Hub）
      ## 可选1：登录GitHub Packages（推荐，无需额外注册）
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # GitHub自动生成的token，无需手动配置

      ## 可选2：登录Docker Hub（需提前在GitHub Secrets配置DOCKER_HUB_USERNAME和DOCKER_HUB_TOKEN）
      # - name: Login to Docker Hub
      #   uses: docker/login-action@v3
      #   with:
      #     username: ${{ secrets.DOCKER_HUB_USERNAME }}
      #     password: ${{ secrets.DOCKER_HUB_TOKEN }}

      # 步骤5：提取镜像标签（适配分支/标签）
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          # 镜像名称（替换为你的GitHub用户名/项目名）
          images: |
            ghcr.io/jinyanshenxing/qq-farm-bot-kami # GitHub Packages
            # jinyanshenxing/qq-farm-bot-kami      # Docker Hub（需启用上方Docker Hub登录）
          # 标签规则：主分支为latest，标签为对应版本，提交哈希为短标识
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=short
          flavor: |
            latest=true

      # 步骤6：构建并推送Docker镜像
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: . # 构建上下文（项目根目录）
          platforms: ${{ matrix.platform }} # 多架构构建
          push: true # 推送镜像（本地测试可设为false）
          tags: ${{ steps.meta.outputs.tags }} # 自动生成的标签
          labels: ${{ steps.meta.outputs.labels }} # 自动生成的标签
          cache-from: type=gha # 缓存加速构建
          cache-to: type=gha,mode=max # 缓存持久化
