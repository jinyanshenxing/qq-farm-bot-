name: Build and Push Docker Image (x86 only)

# 触发条件：推送到main分支、打标签，或手动触发
on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch: # 手动触发

# 必要权限（推送镜像到GitHub Packages）
permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    # 移除多架构matrix，只构建单架构
    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 设置Docker Buildx（无需QEMU，因为只构建amd64）
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. 登录GitHub容器仓库
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 4. 生成镜像标签
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/jinyanshenxing/qq-farm-bot-kami # 你的镜像地址
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=short
          flavor: |
            latest=true

      # 5. 构建并推送amd64镜像（核心：指定固定平台）
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64 # 仅构建x86/amd64架构
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
